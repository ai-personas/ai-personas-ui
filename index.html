<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PersonaOS Discovery</title>
  <link rel="stylesheet" href="assets/discovery.css">
</head>
<body>
  <div class="ticker"><div class="ticker-track" id="ticker"></div></div>

  <header class="topbar">
    <div class="brand">
      <span class="livedot" id="livedot"></span>
      <span class="mark">PersonaOS</span><span class="exch">DISCOVERY&nbsp;EXCHANGE</span>
      <span class="tag">runtime-resolved · Ed25519-verified · internet (DHT) + intranet (mDNS)</span>
    </div>
    <div class="board-stats" id="stats"></div>
  </header>

  <div class="controls">
    <input id="q" type="search" placeholder="filter symbol / kind / DID / kernel…" aria-label="filter">
    <div class="chips" id="plane-filter" role="group" aria-label="plane">
      <button data-plane="all" class="chip on">ALL</button>
      <button data-plane="internet" class="chip">INTERNET·DHT</button>
      <button data-plane="intranet" class="chip">INTRANET·mDNS</button>
    </div>
    <div class="chips" id="kind-filter"></div>
    <span class="grow"></span>
    <input id="peer" type="url" placeholder="discover peer https://host" aria-label="peer">
    <button id="addpeer" class="btn">＋ PEER</button>
    <button id="pause" class="btn">⏸ PAUSE</button>
  </div>

  <main class="grid">
    <section class="board">
      <table class="watch">
        <thead>
          <tr>
            <th data-sort="label" class="l">SYMBOL</th>
            <th data-sort="kind">KIND</th>
            <th data-sort="tier">TIER</th>
            <th>NET</th>
            <th title="signature verified in-browser">✓</th>
            <th data-sort="events" class="r num">EVENTS</th>
            <th data-sort="rate" class="r num">EV/s</th>
            <th class="r">LAST</th>
            <th>ACTIVITY</th>
            <th>STATUS</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </section>

    <aside class="tape">
      <div class="tape-head">
        <span>EVENT&nbsp;TAPE</span>
        <span class="replay" id="feedmode">REPLAY</span>
        <span class="eps" id="eps">0 ev/s</span>
      </div>
      <ol class="tape-body" id="tape"></ol>
    </aside>
  </main>

  <footer>
    <span id="status">booting discovery…</span>
    <button id="logbtn" class="link">discovery log</button>
  </footer>

  <div class="logmodal" id="logmodal" hidden>
    <div class="logcard">
      <div class="logcard-head"><b>Discovery log</b> <button id="logclose" class="link">close</button></div>
      <ol class="log" id="log"></ol>
    </div>
  </div>

  <script type="module" src="assets/discovery.js"></script>
</body>
</html>

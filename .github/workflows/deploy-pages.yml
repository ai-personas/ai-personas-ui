name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-flight publish finish rather than abort it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact   # whole repo root IS the static site (index.html at root)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  hosted-smoke:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout deployed commit
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright
        run: |
          python3 -m pip install 'playwright>=1.50,<2'
          python3 -m playwright install --with-deps chromium

      - name: Verify exact hosted assets and browser boot
        run: |
          python3 tools/test-hosted-deploy.py \
            --base-url '${{ needs.deploy.outputs.page_url }}' \
            --expected-root . \
            --commit '${{ github.sha }}' \
            --screenshot '${{ runner.temp }}/personaos-hosted-smoke.png'

      - name: Upload hosted smoke capture
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hosted-pages-smoke-${{ github.run_id }}
          path: ${{ runner.temp }}/personaos-hosted-smoke.png
          if-no-files-found: warn
          retention-days: 7
